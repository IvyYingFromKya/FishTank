<!-- templates/includes/dashboard_content.html -->
<h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h1>

<!-- Dashboard Cards -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
  <!-- Nodes Card -->
  <div class="bg-white p-4 rounded-lg shadow flex items-center">
    <div class="bg-blue-100 text-blue-500 rounded-full p-3 mr-4">
      <i class="fas fa-microchip fa-lg"></i>
    </div>
    <div>
      <p class="text-sm text-gray-500">Nodes</p>
      <h2 class="text-xl font-bold text-gray-800">
        <span id="total-nodes">0</span> total / <span id="active-nodes">0</span> active
      </h2>
    </div>
  </div>

  <!-- Sensors Card -->
  <div class="bg-white p-4 rounded-lg shadow flex items-center">
    <div class="bg-green-100 text-green-500 rounded-full p-3 mr-4">
      <i class="fas fa-thermometer-half fa-lg"></i>
    </div>
    <div>
      <p class="text-sm text-gray-500">Sensors</p>
      <h2 class="text-xl font-bold text-gray-800">
        <span id="total-sensors">0</span> total / <span id="active-sensors">0</span> active
      </h2>
    </div>
  </div>

  <!-- Alerts Card -->
  <div class="bg-white p-4 rounded-lg shadow flex items-center">
    <div class="bg-red-100 text-red-500 rounded-full p-3 mr-4">
      <i class="fas fa-exclamation-triangle fa-lg"></i>
    </div>
    <div>
      <p class="text-sm text-gray-500">Alerts</p>
      <h2 class="text-xl font-bold text-gray-800">
        <span id="total-alerts">0</span> alerts / <span id="critical-alerts">0</span> critical
      </h2>
    </div>
  </div>

  <!-- Data Points Today Card -->
  <div class="bg-white p-4 rounded-lg shadow flex items-center">
    <div class="bg-purple-100 text-purple-500 rounded-full p-3 mr-4">
      <i class="fas fa-database fa-lg"></i>
    </div>
    <div>
      <p class="text-sm text-gray-500">Data Points Today</p>
      <h2 class="text-xl font-bold text-gray-800" id="data-points-today">0</h2>
    </div>
  </div>
</div>

<!-- Chart Section -->
<div class="bg-white rounded-lg shadow p-4">
  <div class="flex items-center justify-between mb-4">
    <div class="flex space-x-4">
      <button class="tab-btn text-sm font-medium text-blue-600 border-b-2 border-blue-600" data-tab="temperature">Temperature</button>
      <button class="tab-btn text-sm font-medium text-gray-500 hover:text-blue-600" data-tab="humidity">Humidity</button>
    </div>
    <div class="flex items-center space-x-3 text-gray-500">
      <button class="range-filter text-sm text-blue-600" data-range="ALL">All</button>
      <button class="range-filter text-sm hover:text-blue-600" data-range="24H">24H</button>
      <button class="range-filter text-sm hover:text-blue-600" data-range="7D">7D</button>
      <button class="range-filter text-sm hover:text-blue-600" data-range="1M">1M</button>
    </div>
  </div>

  <div class="tab-content" id="temperature-tab">
    <canvas id="temperatureChart" height="120"></canvas>
  </div>
  <div class="tab-content hidden" id="humidity-tab">
    <canvas id="humidityChart" height="120"></canvas>
  </div>
</div>

<script src="/static/dashboard.js" defer></script>

<!-- Latest Readings Table -->
<div class="bg-white rounded-lg shadow overflow-hidden mt-6">
  <div class="px-6 py-4 border-b border-gray-200">
    <h3 class="text-lg font-medium text-gray-900">Latest Sensor Readings</h3>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sensor ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Node</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Value</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Timestamp</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
        </tr>
      </thead>
      <tbody id="sensor-table-body" class="bg-white divide-y divide-gray-200">
        <!-- Filled dynamically -->
      </tbody>
    </table>
  </div>
</div>
