<!-- templates/includes/config_content.html -->
<h1 class="text-2xl font-bold text-gray-800 mb-4">System Configuration</h1>

<div class="bg-white p-6 rounded-lg shadow max-w-2xl">
  <p class="text-gray-600 mb-4">Edit control center configuration settings below:</p>

  <form>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">System Name</label>
      <input type="text" name="system_name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">Default Threshold</label>
      <input type="number" name="threshold" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
    </div>

    <button type="submit" class="mt-2 px-4 py-2 bg-indigo-500 text-white rounded hover:bg-indigo-600">Save Settings</button>
  </form>
</div>
